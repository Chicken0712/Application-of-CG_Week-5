<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Canvas + Video Edge Detection</title>
  <style>
    body {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
    }

    video, canvas {
      border: 2px solid white;
    }
  </style>
</head>
<body>

<video id="video" width="400" height="300" controls>
  <source src="video.mp4" type="video/mp4">
</video>

<canvas id="canvas" width="400" height="300"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function detectEdges() {
  if (video.paused || video.ended) return;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = frame.data;

  let width = canvas.width;
  let height = canvas.height;

  let output = ctx.createImageData(width, height);
  let outData = output.data;

  let gx = [-1, 0, 1,
            -2, 0, 2,
            -1, 0, 1];

  let gy = [-1, -2, -1,
             0,  0,  0,
             1,  2,  1];

  for (let y = 1; y < height - 1; y++) {
    for (let x = 1; x < width - 1; x++) {
      let sumX = 0;
      let sumY = 0;

      for (let ky = -1; ky <= 1; ky++) {
        for (let kx = -1; kx <= 1; kx++) {
          let i = ((y + ky) * width + (x + kx)) * 4;
          let gray = (data[i] + data[i+1] + data[i+2]) / 3;

          let k = (ky + 1) * 3 + (kx + 1);
          sumX += gray * gx[k];
          sumY += gray * gy[k];
        }
      }

      let magnitude = Math.sqrt(sumX * sumX + sumY * sumY);
      let idx = (y * width + x) * 4;

      outData[idx] = magnitude;
      outData[idx+1] = magnitude;
      outData[idx+2] = magnitude;
      outData[idx+3] = 255;
    }
  }

  ctx.putImageData(output, 0, 0);

  requestAnimationFrame(detectEdges);
}

video.addEventListener("play", () => {
  detectEdges();
});
</script>

</body>
</html>
